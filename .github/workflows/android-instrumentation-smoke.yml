name: Android Instrumentation Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  connected-android-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Robolectric smoke test
        run: ./gradlew :lab-host-nav2:testDebugUnitTest :lab-host-nav3:testDebugUnitTest :lab-host-fragment:testDebugUnitTest --stacktrace

      - name: Run connectedAndroidTest smoke suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: ./gradlew :app:assembleDebug :lab-testkit:connectedAndroidTest --stacktrace
