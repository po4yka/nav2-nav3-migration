name: Android Instrumentation Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint and Robolectric smoke test
        run: ./gradlew lintDebug :app:testDebugUnitTest :lab-host-nav2:testDebugUnitTest :lab-host-nav3:testDebugUnitTest :lab-host-fragment:testDebugUnitTest --stacktrace

  connected-android-test:
    needs: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        api-level: [34, 35, 36]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM access for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connectedAndroidTest smoke suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -no-snapshot
          script: |
            set -eu
            sdk=""
            i=1
            while [ "$i" -le 30 ]; do
              sdk="$(adb shell getprop ro.build.version.sdk 2>/dev/null | tr -d '\r\n')"
              case "$sdk" in
                ''|*[!0-9]*)
                  echo "Waiting for responsive emulator shell ($i/30)..."
                  sleep 5
                  i=$((i + 1))
                  ;;
                *)
                  echo "Emulator API level: $sdk"
                  break
                  ;;
              esac
            done
            case "$sdk" in
              ''|*[!0-9]*)
                echo "Emulator shell never became responsive."
                exit 1
                ;;
            esac
            ./gradlew :app:assembleDebug :lab-testkit:connectedAndroidTest --stacktrace
